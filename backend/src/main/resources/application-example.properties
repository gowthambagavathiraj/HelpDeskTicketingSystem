# ============================================
# HELPDESK APPLICATION CONFIGURATION (EXAMPLE)
# ============================================
# 
# IMPORTANT: This is an EXAMPLE configuration file.
# Before running the application:
#   1. Copy this file to 'application.properties' in the same directory
#   2. Update all placeholder values with real credentials:
#      - Database: DB_USERNAME, DB_PASSWORD
#      - Security: JWT_SECRET (must be at least 32 characters)
#      - Email: Mail server credentials for verification emails
#      - AI: GEMINI_API_KEY from https://aistudio.google.com/apikey
#      - Admin: app.admin.password (initial admin password)
#   3. Never commit application.properties with real secrets to version control
#
# ============================================

spring.application.name=helpdesk-backend

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/helpdesk_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${DB_USERNAME:your_db_username}
spring.datasource.password=${DB_PASSWORD:your_db_password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
app.jwt.secret=${JWT_SECRET:your-256-bit-secret-key}
app.jwt.expiration=86400000

# Server
server.port=8080
server.error.include-message=always

# CORS
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=./uploads

# Mail Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=your_email
spring.mail.password=your_email_password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.from=your_email

# Admin Configuration
app.admin.name=System Administrator
app.admin.email=admin@example.com
app.admin.password=admin_password

# Frontend URL
app.frontend.url=${FRONTEND_URL:http://localhost:3000}

# Gemini AI Agent
gemini.api.key=${GEMINI_API_KEY:}
gemini.model=${GEMINI_MODEL:gemini-1.5-flash}

# Logging
logging.level.com.helpdesk=INFO
logging.level.org.springframework.security=WARN
